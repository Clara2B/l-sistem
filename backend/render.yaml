services:
  - type: web
    name: lsistem-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lsistem-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://lsistem.vercel.app

databases:
  - name: lsistem-db
    plan: free
